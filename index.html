<html lang="es">
<head>

<style>

  :root {
    --green-field: #0d3b1e;
    --gold:        #f0c040;
    --gold-dim:    #a88520;
    --white:       #f5f5f0;
    --gray:        #8a8a82;
    --red-live:    #e83030;
    --bg-card:     rgba(255,255,255,0.05);
    --border:      rgba(255,255,255,0.10);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--green-field);
    color: var(--white);
    min-height: 100vh;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 60px, rgba(255,255,255,0.018) 60px, rgba(255,255,255,0.018) 61px),
      repeating-linear-gradient(90deg, transparent, transparent 60px, rgba(255,255,255,0.018) 60px, rgba(255,255,255,0.018) 61px);
  }

  .top-bar {
    background: rgba(0,0,0,0.35);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--border);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 800; letter-spacing: -0.5px; color: var(--gold); }
  .logo span { color: var(--white); font-weight: 700; }
  .top-right { display: flex; align-items: center; gap: 12px; }
  .clock-box { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--gray); text-align: right; line-height: 1.5; }
  .clock-box b { color: var(--white); font-size: 13px; }

  .btn-edit {
    background: var(--bg-card);
    border: 1px solid var(--border);
    color: var(--white);
    padding: 7px 14px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: background .15s;
  }
  .btn-edit:hover { background: rgba(255,255,255,.12); }
  .btn-edit.active { background: var(--gold); color: var(--green-field); border-color: var(--gold); }

  .app { padding: 16px 16px 40px; max-width: 900px; margin: 0 auto; }

  .update-note {
    background: rgba(240,192,64,.08);
    border: 1px solid rgba(240,192,64,.25);
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 11px;
    color: var(--gold-dim);
    margin-bottom: 14px;
    line-height: 1.5;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  .btn-reset {
    background: transparent;
    border: 1px solid rgba(232,48,48,.4);
    color: var(--red-live);
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 10px;
    cursor: pointer;
    white-space: nowrap;
  }
  .btn-reset:hover { background: rgba(232,48,48,.1); }

  .tabs { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; }
  .tab {
    font-size: 12px; font-weight: 600; padding: 7px 14px; border-radius: 8px; cursor: pointer;
    border: 1px solid var(--border); background: var(--bg-card); color: var(--gray); transition: all .15s;
  }
  .tab.active { background: var(--gold); color: var(--green-field); border-color: var(--gold); }
  .tab:hover:not(.active) { color: var(--white); border-color: rgba(255,255,255,.25); }

  .matches-grid { display: flex; flex-direction: column; gap: 8px; }
  .match-card {
    background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 12px 16px;
    display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 10px; transition: background .15s;
  }
  .match-card:hover { background: rgba(255,255,255,.08); }
  .match-card.col-card { border-color: var(--gold); background: rgba(240,192,64,0.07); }
  .match-card.editing { border-color: var(--gold); border-width: 1.5px; }

  .team { display: flex; align-items: center; gap: 8px; }
  .team.right { flex-direction: row-reverse; text-align: right; }
  .team-flag { font-size: 22px; line-height: 1; }
  .team-name { font-size: 13px; font-weight: 600; color: var(--white); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 110px; }

  .score-box { text-align: center; flex-shrink: 0; }
  .score-nums { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; color: var(--white); letter-spacing: 2px; line-height: 1; }
  .score-nums.upcoming { font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 400; color: var(--gray); letter-spacing: 1px; }
  .match-meta { font-size: 10px; color: var(--gray); margin-top: 3px; line-height: 1.4; }
  .fin-badge { display: inline-block; background: rgba(255,255,255,0.12); color: var(--gray); font-size: 9px; font-weight: 600; padding: 2px 6px; border-radius: 4px; margin-top: 3px; letter-spacing: .3px; }

  .score-edit { display: flex; align-items: center; gap: 6px; justify-content: center; }
  .score-input {
    width: 34px; text-align: center;
    background: rgba(255,255,255,0.1);
    border: 1px solid var(--gold);
    border-radius: 6px;
    color: var(--white);
    font-family: 'Syne', sans-serif;
    font-size: 16px;
    font-weight: 700;
    padding: 4px 0;
  }
  .score-input:focus { outline: none; background: rgba(255,255,255,0.18); }
  .score-dash { color: var(--gray); font-weight: 700; }
  .btn-clear-score {
    background: none;
    border: none;
    color: var(--gray);
    font-size: 14px;
    cursor: pointer;
    margin-left: 4px;
  }
  .btn-clear-score:hover { color: var(--red-live); }

  .date-sep { font-size: 11px; font-weight: 600; color: var(--gold-dim); text-transform: uppercase; letter-spacing: 1px; padding: 12px 0 4px; font-family: 'DM Mono', monospace; }
  .date-sep.first { padding-top: 0; }

  .groups-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 10px; }
  .group-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  .group-head { padding: 8px 14px; background: rgba(0,0,0,0.2); border-bottom: 1px solid var(--border); font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700; color: var(--gold); letter-spacing: .5px; }
  .group-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .group-table th { padding: 5px 6px; color: var(--gray); font-weight: 500; font-size: 10px; text-align: center; border-bottom: 1px solid var(--border); }
  .group-table th:first-child { text-align: left; padding-left: 10px; }
  .group-table td { padding: 6px 6px; text-align: center; border-top: 1px solid rgba(255,255,255,0.05); color: rgba(255,255,255,.8); }
  .group-table td:first-child { text-align: left; padding-left: 10px; }
  .group-table .pts-cell { font-weight: 700; color: var(--white); }
  .row-q { border-left: 3px solid #185fa5; }
  .row-t { border-left: 3px solid #2d7a14; }
  .team-cell { display: flex; align-items: center; gap: 6px; }
  .mini-flag { font-size: 14px; }
  .mini-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 95px; }
  .stat-input {
    width: 26px; text-align: center;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(240,192,64,.4);
    border-radius: 4px;
    color: var(--white);
    font-size: 11px;
    padding: 2px 0;
  }
  .stat-input:focus { outline: none; background: rgba(255,255,255,0.18); }

  .legend { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 12px; font-size: 11px; color: var(--gray); }
  .legend span { display: flex; align-items: center; gap: 5px; }
  .ldot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }

  .col-header {
    background: linear-gradient(135deg, rgba(240,192,64,.15), rgba(0,0,0,0));
    border: 1px solid rgba(240,192,64,.3);
    border-radius: 12px; padding: 16px 20px; margin-bottom: 14px;
    display: flex; align-items: center; gap: 14px;
  }
  .col-flag { font-size: 40px; }
  .col-info h3 { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 800; color: var(--gold); }
  .col-info p { font-size: 12px; color: var(--gray); margin-top: 2px; }

  .edit-banner {
    background: rgba(240,192,64,.12);
    border: 1px solid var(--gold);
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 12px;
    color: var(--gold);
    margin-bottom: 14px;
    display: none;
  }
  .edit-banner.show { display: block; }

  @media(max-width:480px){
    .team-name { max-width: 70px; font-size: 12px; }
    .score-nums { font-size: 18px; }
    .team-flag { font-size: 18px; }
    .groups-grid { grid-template-columns: 1fr; }
    .mini-name { max-width: 70px; }
    .group-table { font-size: 11px; }
    .group-table th, .group-table td { padding: 5px 3px; }
  }
</style>

// ════════════════════════════════════════════════════════════
//  PERSISTENCIA — localStorage
// ════════════════════════════════════════════════════════════

const STORAGE_KEY = 'mundial2026_datos';
let modoEdicion = false;
let DATOS = null;

function cargarDatos() {
  try {
    const guardado = localStorage.getItem(STORAGE_KEY);
    DATOS = guardado ? JSON.parse(guardado) : JSON.parse(JSON.stringify(DATOS_BASE));
  } catch(e) {
    DATOS = JSON.parse(JSON.stringify(DATOS_BASE));
  }
}

function guardarDatos() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(DATOS));
  const ahora = new Date().toLocaleString('es-CO', {
    timeZone:'America/Bogota', day:'numeric', month:'long', year:'numeric', hour:'2-digit', minute:'2-digit'
  });
  document.getElementById('fecha-actualizacion').textContent = ahora;
  localStorage.setItem(STORAGE_KEY + '_fecha', ahora);
}

function reiniciarDatos() {
  if (!confirm('¿Restablecer todos los datos a los valores originales? Se perderán tus ediciones.')) return;
  localStorage.removeItem(STORAGE_KEY);
  localStorage.removeItem(STORAGE_KEY + '_fecha');
  cargarDatos();
  renderTodo();
  document.getElementById('fecha-actualizacion').textContent = '19 de junio de 2026';
}

function toggleEdicion() {
  modoEdicion = !modoEdicion;
  document.getElementById('btn-edit').classList.toggle('active', modoEdicion);
  document.getElementById('btn-edit').textContent = modoEdicion ? '✓ Listo' : '✏️ Editar';
  document.getElementById('edit-banner').classList.toggle('show', modoEdicion);
  renderTodo();
}

// ════════════════════════════════════════════════════════════
//  RELOJ
// ════════════════════════════════════════════════════════════

function tickClock() {
  const now = new Date();
  const col = new Date(now.getTime() - (now.getTimezoneOffset() + 300) * 60000);
  document.getElementById('clock').textContent = col.toTimeString().slice(0,8);
}
setInterval(tickClock, 1000);
tickClock();

// ════════════════════════════════════════════════════════════
//  RENDER: COLOMBIA
// ════════════════════════════════════════════════════════════

function scoreInputHtml(matchId, r1, r2, campo1, campo2) {
  if (!modoEdicion) {
    if (r1 == null || r2 == null) return null;
    return `<div class="score-nums">${r1} - ${r2}</div><div class="fin-badge">FINALIZADO</div>`;
  }
  return `
    <div class="score-edit">
      <input type="number" min="0" max="20" class="score-input" value="${r1 ?? ''}"
        onchange="actualizarMarcador('${matchId}', '${campo1}', this.value)" placeholder="-">
      <span class="score-dash">-</span>
      <input type="number" min="0" max="20" class="score-input" value="${r2 ?? ''}"
        onchange="actualizarMarcador('${matchId}', '${campo2}', this.value)" placeholder="-">
    </div>`;
}

function renderColombia() {
  const el = document.getElementById('vista-colombia');
  el.innerHTML = `
    <div class="col-header">
      <div class="col-flag">🇨🇴</div>
      <div class="col-info">
        <h3>Colombia · Grupo K</h3>
        <p>Tres partidos — fase de grupos Mundial 2026</p>
      </div>
    </div>
    <div class="matches-grid">
      ${DATOS.colombia.map(m => {
        const score = scoreInputHtml(m.id, m.r1, m.r2, 'r1', 'r2');
        return `
        <div class="match-card col-card ${modoEdicion ? 'editing' : ''}">
          <div class="team">
            <span class="team-flag">🇨🇴</span>
            <span class="team-name">Colombia</span>
          </div>
          <div class="score-box">
            ${score || `<div class="score-nums upcoming">${m.hora}</div><div class="match-meta">Hora COL</div>`}
            <div class="match-meta">${m.fecha} · ${m.lugar}</div>
          </div>
          <div class="team right">
            <span class="team-flag">${m.rival.split(' ')[0]}</span>
            <span class="team-name">${m.rival.split(' ').slice(1).join(' ')}</span>
          </div>
        </div>`;
      }).join('')}
    </div>`;
}

function actualizarMarcador(matchId, campo, valor) {
  const num = valor === '' ? null : parseInt(valor);
  // Buscar en colombia
  let item = DATOS.colombia.find(m => m.id === matchId);
  if (!item) {
    // Buscar en fixture
    for (const jornada of DATOS.fixture) {
      item = jornada.partidos.find(p => p.id === matchId);
      if (item) break;
    }
  }
  if (item) {
    item[campo] = num;
    guardarDatos();
  }
}

// ════════════════════════════════════════════════════════════
//  RENDER: GRUPOS
// ════════════════════════════════════════════════════════════

function statInputHtml(grupoId, equipoIdx, campo, valor) {
  if (!modoEdicion) return valor;
  return `<input type="number" min="0" max="99" class="stat-input" value="${valor}"
    onchange="actualizarStat('${grupoId}', ${equipoIdx}, '${campo}', this.value)">`;
}

function renderGrupos() {
  const el = document.getElementById('vista-grupos');
  const legend = `
    <div class="legend">
      <span><span class="ldot" style="background:#185fa5"></span>Clasifica directo</span>
      <span><span class="ldot" style="background:#2d7a14"></span>Mejor tercero</span>
    </div>`;
  const cards = DATOS.grupos.map(g => {
    // En modo edición no reordenamos (para no mover los inputs mientras escribes)
    const lista = modoEdicion ? g.equipos.map((t,i) => ({...t, _idx:i}))
      : [...g.equipos].map((t,i) => ({...t, _idx:i})).sort((a,b) =>
          b.pts - a.pts || (b.gf - b.gc) - (a.gf - a.gc) || b.gf - a.gf
        );
    const filas = lista.map((t, i) => {
      const cls = !modoEdicion && i < 2 ? 'row-q' : !modoEdicion && i === 2 ? 'row-t' : '';
      return `<tr class="${cls}">
        <td><div class="team-cell"><span class="mini-flag">${t.f}</span><span class="mini-name">${t.n}</span></div></td>
        <td>${statInputHtml(g.id, t._idx, 'pj', t.pj)}</td>
        <td>${statInputHtml(g.id, t._idx, 'pg', t.pg)}</td>
        <td>${statInputHtml(g.id, t._idx, 'pe', t.pe)}</td>
        <td>${statInputHtml(g.id, t._idx, 'pp', t.pp)}</td>
        <td>${statInputHtml(g.id, t._idx, 'gf', t.gf)}</td>
        <td>${statInputHtml(g.id, t._idx, 'gc', t.gc)}</td>
        <td class="pts-cell">${statInputHtml(g.id, t._idx, 'pts', t.pts)}</td>
      </tr>`;
    }).join('');
    return `
      <div class="group-card">
        <div class="group-head">GRUPO ${g.id}</div>
        <table class="group-table">
          <thead><tr><th>Selección</th><th>PJ</th><th>PG</th><th>PE</th><th>PP</th><th>GF</th><th>GC</th><th>Pts</th></tr></thead>
          <tbody>${filas}</tbody>
        </table>
      </div>`;
  }).join('');
  el.innerHTML = legend + `<div class="groups-grid">${cards}</div>`;
}

function actualizarStat(grupoId, equipoIdx, campo, valor) {
  const grupo = DATOS.grupos.find(g => g.id === grupoId);
  if (grupo && grupo.equipos[equipoIdx]) {
    grupo.equipos[equipoIdx][campo] = parseInt(valor) || 0;
    guardarDatos();
  }
}

// ════════════════════════════════════════════════════════════
//  RENDER: FIXTURE
// ════════════════════════════════════════════════════════════

function renderFixture() {
  const el = document.getElementById('vista-fixture');
  el.innerHTML = DATOS.fixture.map(j => `
    <div class="date-sep first">${j.jornada}</div>
    <div class="matches-grid">
      ${j.partidos.map(p => {
        const cardClass = (p.col ? 'col-card ' : '') + (modoEdicion ? 'editing' : '');
        const score = scoreInputHtml(p.id, p.r1, p.r2, 'r1', 'r2');
        return `
          <div class="match-card ${cardClass}">
            <div class="team">
              <span class="team-flag">${p.e1.split(' ')[0]}</span>
              <span class="team-name">${p.e1.split(' ').slice(1).join(' ')}</span>
            </div>
            <div class="score-box">
              ${score || `<div class="score-nums upcoming">${p.h}</div><div class="match-meta">Hora COL</div>`}
              <div class="match-meta">${p.d} · Gr. ${p.g}</div>
            </div>
            <div class="team right">
              <span class="team-flag">${p.e2.split(' ').slice(-1)[0]}</span>
              <span class="team-name">${p.e2.split(' ').slice(0,-1).join(' ')}</span>
            </div>
          </div>`;
      }).join('')}
    </div>`).join('');
}

// ════════════════════════════════════════════════════════════
//  TABS Y RENDER GENERAL
// ════════════════════════════════════════════════════════════

function cambiarTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i) => {
    t.classList.toggle('active', ['colombia','grupos','fixture'][i] === tab);
  });
  ['colombia','grupos','fixture'].forEach(v => {
    document.getElementById('vista-'+v).style.display = v === tab ? 'block' : 'none';
  });
}

function renderTodo() {
  renderColombia();
  renderGrupos();
  renderFixture();
}

// ════════════════════════════════════════════════════════════
//  INICIO
// ════════════════════════════════════════════════════════════

cargarDatos();
const fechaGuardada = localStorage.getItem(STORAGE_KEY + '_fecha');
if (fechaGuardada) document.getElementById('fecha-actualizacion').textContent = fechaGuardada;
renderTodo();
</script>
