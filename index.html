<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mundial 2026 · Colombia</title>
<style>

  :root {
    --green-field: #0d3b1e;
    --gold:        #f0c040;
    --gold-dim:    #a88520;
    --white:       #f5f5f0;
    --gray:        #8a8a82;
    --red-live:    #e83030;
    --bg-card:     rgba(255,255,255,0.05);
    --border:      rgba(255,255,255,0.10);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--green-field);
    color: var(--white);
    min-height: 100vh;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 60px, rgba(255,255,255,0.018) 60px, rgba(255,255,255,0.018) 61px),
      repeating-linear-gradient(90deg, transparent, transparent 60px, rgba(255,255,255,0.018) 60px, rgba(255,255,255,0.018) 61px);
  }

  .top-bar {
    background: rgba(0,0,0,0.35);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--border);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 800; letter-spacing: -0.5px; color: var(--gold); }
  .logo span { color: var(--white); font-weight: 700; }
  .clock-box { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--gray); text-align: right; line-height: 1.5; }
  .clock-box b { color: var(--white); font-size: 13px; }

  .app { padding: 16px 16px 40px; max-width: 900px; margin: 0 auto; }

  .update-note {
    background: rgba(240,192,64,.08);
    border: 1px solid rgba(240,192,64,.25);
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 11px;
    color: var(--gold-dim);
    margin-bottom: 14px;
    line-height: 1.5;
  }

  .tabs { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; }
  .tab {
    font-size: 12px; font-weight: 600; padding: 7px 14px; border-radius: 8px; cursor: pointer;
    border: 1px solid var(--border); background: var(--bg-card); color: var(--gray); transition: all .15s;
  }
  .tab.active { background: var(--gold); color: var(--green-field); border-color: var(--gold); }
  .tab:hover:not(.active) { color: var(--white); border-color: rgba(255,255,255,.25); }

  .matches-grid { display: flex; flex-direction: column; gap: 8px; }
  .match-card {
    background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 12px 16px;
    display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 10px; transition: background .15s;
  }
  .match-card:hover { background: rgba(255,255,255,.08); }
  .match-card.live-card { border-color: var(--red-live); background: rgba(232,48,48,0.07); }
  .match-card.col-card { border-color: var(--gold); background: rgba(240,192,64,0.07); }

  .team { display: flex; align-items: center; gap: 8px; }
  .team.right { flex-direction: row-reverse; text-align: right; }
  .team-flag { font-size: 22px; line-height: 1; }
  .team-name { font-size: 13px; font-weight: 600; color: var(--white); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 110px; }

  .score-box { text-align: center; flex-shrink: 0; }
  .score-nums { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; color: var(--white); letter-spacing: 2px; line-height: 1; }
  .score-nums.upcoming { font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 400; color: var(--gray); letter-spacing: 1px; }
  .match-meta { font-size: 10px; color: var(--gray); margin-top: 3px; line-height: 1.4; }
  .live-badge { display: inline-block; background: var(--red-live); color: #fff; font-size: 9px; font-weight: 700; padding: 2px 6px; border-radius: 4px; letter-spacing: .5px; margin-top: 3px; }
  .fin-badge { display: inline-block; background: rgba(255,255,255,0.12); color: var(--gray); font-size: 9px; font-weight: 600; padding: 2px 6px; border-radius: 4px; margin-top: 3px; letter-spacing: .3px; }

  .date-sep { font-size: 11px; font-weight: 600; color: var(--gold-dim); text-transform: uppercase; letter-spacing: 1px; padding: 12px 0 4px; font-family: 'DM Mono', monospace; }
  .date-sep.first { padding-top: 0; }

  .groups-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 10px; }
  .group-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  .group-head { padding: 8px 14px; background: rgba(0,0,0,0.2); border-bottom: 1px solid var(--border); font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700; color: var(--gold); letter-spacing: .5px; }
  .group-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .group-table th { padding: 5px 10px; color: var(--gray); font-weight: 500; font-size: 10px; text-align: center; border-bottom: 1px solid var(--border); }
  .group-table th:first-child { text-align: left; }
  .group-table td { padding: 6px 10px; text-align: center; border-top: 1px solid rgba(255,255,255,0.05); color: rgba(255,255,255,.8); }
  .group-table td:first-child { text-align: left; }
  .group-table .pts-cell { font-weight: 700; color: var(--white); }
  .row-q { border-left: 3px solid #185fa5; }
  .row-t { border-left: 3px solid #2d7a14; }
  .team-cell { display: flex; align-items: center; gap: 6px; }
  .mini-flag { font-size: 14px; }
  .mini-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 110px; }

  .legend { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 12px; font-size: 11px; color: var(--gray); }
  .legend span { display: flex; align-items: center; gap: 5px; }
  .ldot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }

  .col-header {
    background: linear-gradient(135deg, rgba(240,192,64,.15), rgba(0,0,0,0));
    border: 1px solid rgba(240,192,64,.3);
    border-radius: 12px; padding: 16px 20px; margin-bottom: 14px;
    display: flex; align-items: center; gap: 14px;
  }
  .col-flag { font-size: 40px; }
  .col-info h3 { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 800; color: var(--gold); }
  .col-info p { font-size: 12px; color: var(--gray); margin-top: 2px; }

  @media(max-width:480px){
    .team-name { max-width: 75px; font-size: 12px; }
    .score-nums { font-size: 18px; }
    .team-flag { font-size: 18px; }
    .groups-grid { grid-template-columns: 1fr; }
  }
</style>

function tickClock() {
  const now = new Date();
  const col = new Date(now.getTime() - (now.getTimezoneOffset() + 300) * 60000);
  document.getElementById('clock').textContent = col.toTimeString().slice(0,8);
}
setInterval(tickClock, 1000);
tickClock();

function renderColombia() {
  const el = document.getElementById('vista-colombia');
  el.innerHTML = `
    <div class="col-header">
      <div class="col-flag">🇨🇴</div>
      <div class="col-info">
        <h3>Colombia · Grupo K</h3>
        <p>Tres partidos — fase de grupos Mundial 2026</p>
      </div>
    </div>
    <div class="matches-grid">
      ${COLOMBIA.map(m => `
        <div class="match-card col-card">
          <div class="team">
            <span class="team-flag">🇨🇴</span>
            <span class="team-name">Colombia</span>
          </div>
          <div class="score-box">
            ${m.estado === 'finalizado'
              ? `<div class="score-nums">${m.resultado}</div><div class="fin-badge">FINALIZADO</div>`
              : `<div class="score-nums upcoming">${m.hora}</div><div class="match-meta">Hora COL</div>`}
            <div class="match-meta">${m.fecha} · ${m.lugar}</div>
          </div>
          <div class="team right">
            <span class="team-flag">${m.rival.split(' ')[0]}</span>
            <span class="team-name">${m.rival.split(' ').slice(1).join(' ')}</span>
          </div>
        </div>`).join('')}
    </div>`;
}

function renderGrupos() {
  const el = document.getElementById('vista-grupos');
  const legend = `
    <div class="legend">
      <span><span class="ldot" style="background:#185fa5"></span>Clasifica directo</span>
      <span><span class="ldot" style="background:#2d7a14"></span>Mejor tercero</span>
    </div>`;
  const cards = GRUPOS.map(g => {
    const ordenados = [...g.equipos].sort((a,b) =>
      b.pts - a.pts || (b.gf - b.gc) - (a.gf - a.gc) || b.gf - a.gf
    );
    const filas = ordenados.map((t, i) => {
      const cls = i < 2 ? 'row-q' : i === 2 ? 'row-t' : '';
      return `<tr class="${cls}">
        <td><div class="team-cell"><span class="mini-flag">${t.f}</span><span class="mini-name">${t.n}</span></div></td>
        <td>${t.pj}</td><td>${t.pg}</td><td>${t.pe}</td><td>${t.pp}</td>
        <td>${t.gf}</td><td>${t.gc}</td><td class="pts-cell">${t.pts}</td>
      </tr>`;
    }).join('');
    return `
      <div class="group-card">
        <div class="group-head">GRUPO ${g.id}</div>
        <table class="group-table">
          <thead><tr><th>Selección</th><th>PJ</th><th>PG</th><th>PE</th><th>PP</th><th>GF</th><th>GC</th><th>Pts</th></tr></thead>
          <tbody>${filas}</tbody>
        </table>
      </div>`;
  }).join('');
  el.innerHTML = legend + `<div class="groups-grid">${cards}</div>`;
}

function renderFixture() {
  const el = document.getElementById('vista-fixture');
  el.innerHTML = FIXTURE.map(j => `
    <div class="date-sep first">${j.jornada}</div>
    <div class="matches-grid">
      ${j.partidos.map(p => {
        const cardClass = p.col ? 'match-card col-card' : 'match-card';
        const scoreHtml = p.r
          ? `<div class="score-nums">${p.r}</div><div class="fin-badge">FINALIZADO</div>`
          : `<div class="score-nums upcoming">${p.h}</div><div class="match-meta">Hora COL</div>`;
        return `
          <div class="${cardClass}">
            <div class="team">
              <span class="team-flag">${p.e1.split(' ')[0]}</span>
              <span class="team-name">${p.e1.split(' ').slice(1).join(' ')}</span>
            </div>
            <div class="score-box">
              ${scoreHtml}
              <div class="match-meta">${p.d} · Gr. ${p.g}</div>
            </div>
            <div class="team right">
              <span class="team-flag">${p.e2.split(' ').slice(-1)[0]}</span>
              <span class="team-name">${p.e2.split(' ').slice(0,-1).join(' ')}</span>
            </div>
          </div>`;
      }).join('')}
    </div>`).join('');
}

function cambiarTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i) => {
    t.classList.toggle('active', ['colombia','grupos','fixture'][i] === tab);
  });
  ['colombia','grupos','fixture'].forEach(v => {
    document.getElementById('vista-'+v).style.display = v === tab ? 'block' : 'none';
  });
}

renderColombia();
renderGrupos();
renderFixture();
</script>
